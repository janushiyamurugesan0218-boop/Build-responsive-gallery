<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        /* Gallery Grid Setup */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Gallery Item Styling */
        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
            height: 200px;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        /* Hover Effects */
        .gallery-item:hover {
            transform: translateY(-5px);
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Lightbox (Popup) Styling */
        .lightbox {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .lightbox-content {
            max-width: 85%;
            max-height: 85%;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Photo Gallery</h1>

    <div class="gallery-container">
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=1" alt="Image 1"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=2" alt="Image 2"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=3" alt="Image 3"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=4" alt="Image 4"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=5" alt="Image 5"></div>
        <div class="gallery-item"><img src="https://picsum.photos/600/400?random=6" alt="Image 6"></div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="Popup View">
    </div>

    <script src="script.js"></script>
</body>
</html>
